<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاميرا - طلب ذكي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        
        /* شاشة الترحيب */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        
        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .welcome-card h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .welcome-card p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .allow-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .allow-btn:hover { transform: scale(1.05); }
        
        /* الكاميرا - مخفية حتى الموافقة */
        .camera-container {
            display: none;
            width: 100%;
            height: 100%;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- شاشة طلب الإذن اللطيفة -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-card">
            <h1>📷</h1>
            <h2>نحتاج للوصول إلى الكاميرا</h2>
            <p>سنقوم بالتقاط صور للمساعدة في تقديم الخدمة. لن يتم حفظ الصور إلا بعد موافقتك.</p>
            <button class="allow-btn" id="allowBtn">موافق، أسمح بالوصول</button>
        </div>
    </div>

    <!-- الكاميرا - تظهر بعد الموافقة -->
    <div class="camera-container" id="cameraContainer">
        <video id="camera" autoplay playsinline muted></video>
        <div class="status" id="status">✅ الكاميرا تعمل</div>
    </div>

    <script>
        const welcomeScreen = document.getElementById('welcomeScreen');
        const cameraContainer = document.getElementById('cameraContainer');
        const camera = document.getElementById('camera');
        const statusDiv = document.getElementById('status');
        let stream = null;
        
        function showStatus(msg) {
            if (statusDiv) statusDiv.textContent = msg;
            console.log(msg);
        }
        
        async function startCamera() {
            try {
                showStatus('📷 جاري تشغيل الكاميرا...');
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                showStatus('✅ الكاميرا تعمل');
                return true;
            } catch(err) {
                showStatus('❌ لا يمكن الوصول للكاميرا: ' + err.message);
                return false;
            }
        }
        
        async function init() {
            // التحقق أولاً من الإذن (بدون طلب)
            try {
                const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                
                if (permissionStatus.state === 'granted') {
                    // لدينا الإذن مسبقاً - ابدأ مباشرة
                    welcomeScreen.style.display = 'none';
                    cameraContainer.style.display = 'block';
                    startCamera();
                    return;
                }
            } catch(e) {
                // permissions.query قد لا يعمل في بعض المتصفحات
                console.log("لا يمكن التحقق من حالة الإذن");
            }
            
            // إذا لم يكن لدينا إذن، أظهر شاشة الترحيب
            welcomeScreen.style.display = 'flex';
        }
        
        // عند الضغط على زر الموافقة
        document.getElementById('allowBtn').onclick = async () => {
            welcomeScreen.style.opacity = '0';
            setTimeout(async () => {
                welcomeScreen.style.display = 'none';
                cameraContainer.style.display = 'block';
                await startCamera();
            }, 300);
        };
        
        // بدء التشغيل
        init();
        
        // إيقاف الكاميرا عند الخروج
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
        };
    </script>
</body>
</html>
